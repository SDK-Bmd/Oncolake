stages:
  ingest:
    cmd: python pipelines/stage_ingest.py
    deps: [pipelines/stage_ingest.py, src/oncolake/ingest]
    params: [ingest]
    outs: [data/raw/manifest.json]

  features:
    cmd: python pipelines/stage_features.py
    deps:
      - pipelines/stage_features.py
      - src/oncolake/features/staging.py
      - src/oncolake/features/extract.py
      - data/raw/manifest.json
    params: [features]
    outs: [data/staging/features.parquet]

  curate:
    cmd: python pipelines/stage_curate.py
    deps: [pipelines/stage_curate.py, src/oncolake/curate/build.py, data/staging/features.parquet]
    outs: [data/curated.duckdb]